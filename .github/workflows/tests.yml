name: NexusGame CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1 : Tests unitaires ────────────────────────────────────────────────
  unit-tests:
    name: Tests unitaires
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install flask pytest pytest-html pytest-cov

      - name: Lancer les tests unitaires
        run: |
          mkdir -p reports
          pytest tests/test_unit.py -v \
            --cov=app_gamestore \
            --cov-report=html:reports/coverage \
            --html=reports/unit.html --self-contained-html

      - name: Uploader les rapports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-reports
          path: |
            reports/coverage/
            reports/unit.html

  # ── Job 2 : Tests d'intégration ───────────────────────────────────────────
  integration-tests:
    name: Tests d'intégration
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install flask pytest pytest-html requests

      - name: Démarrer l'API GameStore
        run: |
          python app_gamestore.py &
          sleep 5
          curl --fail http://localhost:5000/health

      - name: Lancer les tests d'intégration
        run: |
          mkdir -p reports
          pytest tests/test_integration.py -v \
            --html=reports/integration.html --self-contained-html

      - name: Uploader les rapports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-reports
          path: reports/integration.html

  # ── Job 3 : Tests Newman ───────────────────────────────────────────────────
  api-tests:
    name: Tests API Newman
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install flask
          npm install -g newman newman-reporter-htmlextra

      - name: Démarrer l'API GameStore
        run: |
          python app_gamestore.py &
          sleep 5
          curl --fail http://localhost:5000/health

      - name: Lancer Newman
        run: |
          mkdir -p reports
          newman run tests/gamestore_collection.json \
            --env-var base_url=http://localhost:5000 \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/newman.html

      - name: Uploader les rapports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/newman.html

  # ── Job 4 : Tests UI Playwright ────────────────────────────────────────────
  ui-tests:
    name: Tests UI Playwright
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install flask pytest pytest-playwright playwright pytest-html
          playwright install chromium

      - name: Démarrer l'API GameStore
        run: |
          python app_gamestore.py &
          sleep 5
          curl --fail http://localhost:5000/health

      - name: Lancer les tests UI
        run: |
          mkdir -p reports
          pytest tests/test_ui.py -v \
            --html=reports/ui.html --self-contained-html

      - name: Uploader les rapports et screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-reports
          path: |
            reports/ui.html
            test-results/